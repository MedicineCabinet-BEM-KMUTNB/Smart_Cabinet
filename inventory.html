<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management • Smart Cabinet</title>

  <!-- นำเข้า Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Kanit:wght@300;400;500&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- นำเข้าไลบรารี SheetJS สำหรับอ่านไฟล์ Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg1: #eef6ff;
      --bg2: #fdf2ff;
      --card: rgba(255,255,255,0.78);
      --line: #dfe6ee;
      --text: #243447;
      --muted: #6b7a8c;
      --primary: rgba(47, 54, 64, 0.7);
      --green: rgba(39, 174, 96, 0.7);
      --orange: rgba(243, 156, 18, 0.7);
      --red: rgba(231, 76, 60, 0.7);
      --blue: rgba(52, 152, 219, 0.7);
      --purple: rgba(155, 89, 182, 0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #f6d365);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      padding: 24px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 2.2rem;
      font-family: 'Cormorant Garamond', serif;
      color: #2c3e50;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: #4a5c6e;
      font-weight: 300;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* สไตล์ปุ่มแบบ Liquid Glass (iOS Style) */
    .btn {
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.8);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.4);
    }

    .btn-dark { background: var(--primary); color: white; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-purple { background: var(--purple); color: white; }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    /* Tabs Style */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(255,255,255,0.4);
      padding-bottom: 12px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 12px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.5);
      color: var(--text);
    }

    .tab-btn.active {
      background: white;
      color: var(--blue);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      outline: none;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .form-control:focus {
      background: white;
      border-color: #a1c4fd;
      box-shadow: 0 0 0 3px rgba(161, 196, 253, 0.3);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Table Styles */
    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px;
      background: rgba(255,255,255,0.4);
      max-height: 400px;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(247, 250, 255, 0.95);
      backdrop-filter: blur(8px);
      z-index: 2;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.95rem;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.03);
      font-size: 0.95rem;
    }

    .file-upload-wrapper {
      border: 2px dashed rgba(161, 196, 253, 0.8);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      background: rgba(255,255,255,0.5);
      margin-bottom: 16px;
      transition: background 0.3s;
    }

    .file-upload-wrapper:hover {
      background: rgba(255,255,255,0.8);
    }

    input[type="file"] {
      display: none;
    }

    .custom-file-upload {
      display: inline-block;
      cursor: pointer;
    }

    .instruction {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* --- Toast Notification --- */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 4px solid var(--blue);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-wrap">
        <h1>จัดการคลังยา</h1>
        <p>อัปโหลดฐานข้อมูลยา และเติมยาเข้าตู้ (Stock In)</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-dark" onclick="window.location.href='dashboard.html'">
          <i class="fa-solid fa-house"></i> กลับหน้าหลัก
        </button>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('master')">
          <i class="fa-solid fa-file-excel"></i> ฐานข้อมูลยา (Master Data)
        </button>
        <button class="tab-btn" onclick="switchTab('stock')">
          <i class="fa-solid fa-box-open"></i> เติมยาเข้าตู้ (Stock In)
        </button>
      </div>

      <!-- Tab 1: ฐานข้อมูลยา (อัปโหลด Excel) -->
      <div id="tab-master" class="tab-content active">
        <div class="file-upload-wrapper">
          <label class="custom-file-upload btn btn-blue">
            <input type="file" id="excelFile" accept=".xlsx, .xls" />
            <i class="fa-solid fa-cloud-arrow-up"></i> เลือกไฟล์ Excel
          </label>
          <div class="instruction">
            กรุณาอัปโหลดไฟล์ .xlsx ที่มีคอลัมน์ <b>"รหัสยา"</b> และ <b>"ชื่อยา"</b> เป็นอย่างน้อย
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin:0;">พรีวิวข้อมูล <span id="rowCount" style="color:var(--muted); font-size:1rem;">(0 รายการ)</span></h3>
          <button class="btn btn-green" id="saveDbBtn" style="display:none;">
            <i class="fa-solid fa-database"></i> บันทึกเข้าฐานข้อมูล
          </button>
        </div>

        <div class="table-wrap">
          <table id="previewTable">
            <thead>
              <tr id="previewHead">
                <th>กรุณาอัปโหลดไฟล์เพื่อดูตัวอย่าง</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Tab 2: เติมยาเข้าตู้ (Stock In) -->
      <div id="tab-stock" class="tab-content">
        <div style="max-width: 600px; margin: 0 auto;">
          <h3 style="text-align: center; margin-bottom: 24px;">แบบฟอร์มนำยาเข้าตู้ (Stock In)</h3>
          
          <div class="form-group">
            <label>ค้นหาชื่อยา / รหัสยา (Autocomplete)</label>
            <!-- input list คู่กับ datalist ทำให้เกิด dropdown ค้นหาได้ -->
            <input type="text" class="form-control" id="drugInput" list="drugList" placeholder="พิมพ์ชื่อยาที่ต้องการเติม..." autocomplete="off">
            <datalist id="drugList">
              <!-- ข้อมูลยาจาก Firebase จะถูกโหลดมาใส่ตรงนี้ -->
            </datalist>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>รหัสการผลิต (Lot Number)</label>
              <input type="text" class="form-control" id="lotInput" placeholder="Ex. L2023X99">
            </div>
            <div class="form-group">
              <label>วันหมดอายุ (EXP)</label>
              <input type="date" class="form-control" id="expInput">
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>จำนวนที่นำเข้า</label>
              <input type="number" class="form-control" id="qtyInput" placeholder="ระบุจำนวน" min="1">
            </div>
            <div class="form-group">
              <label>เก็บที่ช่อง (Slot)</label>
              <select class="form-control" id="slotInput">
                <option value="" disabled selected>เลือกช่องตู้ยา</option>
                <option value="slot_1">Slot 1</option>
                <option value="slot_2">Slot 2</option>
                <option value="slot_3">Slot 3</option>
                <option value="slot_4">Slot 4</option>
                <option value="slot_5">Slot 5</option>
              </select>
            </div>
          </div>

          <button class="btn btn-purple" id="stockInBtn" style="width: 100%; justify-content: center; margin-top: 16px; padding: 14px; font-size: 1.1rem;">
            <i class="fa-solid fa-boxes-packing"></i> บันทึกการเติมยาเข้าตู้
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    // Firebase Config (ดึงมาจาก admin.html)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, push, onValue } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEDJ0GGOqxPGik5huW9XdNEgcnlMs_ebM",
      authDomain: "slot-drug.firebaseapp.com",
      projectId: "slot-drug",
      storageBucket: "slot-drug.firebasestorage.app",
      messagingSenderId: "805318911272",
      appId: "1:805318911272:web:d5c569063937d56eb01c1d",
      databaseURL: "https://slot-drug-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let parsedExcelData = []; // ตัวแปรเก็บข้อมูล Excel ชั่วคราว

    // ==========================================
    // UI ควบคุมการทำงานทั่วไป
    // ==========================================
    
    // ตรวจสอบสิทธิ์ (Auth) ป้องกันคนนอกเข้า
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      }
    });

    // ระบบสลับแท็บ
    window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.currentTarget.classList.add('active');
      document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    // ระบบ Toast Notification
    function showToast(message, type = "success") {
      let container = document.getElementById("toast-container");
      if (!container) {
        container = document.createElement("div");
        container.id = "toast-container";
        container.className = "toast-container";
        document.body.appendChild(container);
      }

      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      let icon = type === "error" ? "fa-circle-xmark" : "fa-circle-check";
      let color = type === "error" ? "var(--red)" : "var(--green)";

      toast.innerHTML = `<i class="fa-solid ${icon}" style="font-size:1.2rem; color:${color};"></i> 
                         <span style="font-weight:500;">${message}</span>`;
      container.appendChild(toast);
      
      toast.offsetHeight;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // ==========================================
    // ระบบอ่านไฟล์ Excel (SheetJS)
    // ==========================================
    document.getElementById('excelFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          
          // อ่านชีตแรกสุด
          const firstSheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[firstSheetName];
          
          // แปลงเป็น JSON
          parsedExcelData = XLSX.utils.sheet_to_json(worksheet);
          
          if(parsedExcelData.length > 0) {
            renderPreviewTable(parsedExcelData);
            document.getElementById('saveDbBtn').style.display = 'inline-flex';
            showToast(`อ่านข้อมูลสำเร็จ ${parsedExcelData.length} รายการ`, "success");
          } else {
            showToast("ไม่พบข้อมูลในไฟล์ Excel", "error");
          }
        } catch (error) {
          console.error(error);
          showToast("รูปแบบไฟล์ไม่ถูกต้อง", "error");
        }
      };
      reader.readAsArrayBuffer(file);
    });

    function renderPreviewTable(dataArray) {
      const thead = document.getElementById('previewHead');
      const tbody = document.getElementById('previewBody');
      thead.innerHTML = '';
      tbody.innerHTML = '';

      // ดึง Header จาก keys ของออบเจกต์ตัวแรก
      const headers = Object.keys(dataArray[0]);
      headers.forEach(header => {
        const th = document.createElement('th');
        th.innerText = header;
        thead.appendChild(th);
      });

      // ดึงข้อมูล 10 แถวแรกมาเป็นพรีวิว
      const previewData = dataArray.slice(0, 10);
      previewData.forEach(row => {
        const tr = document.createElement('tr');
        headers.forEach(header => {
          const td = document.createElement('td');
          td.innerText = row[header] !== undefined ? row[header] : '-';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      document.getElementById('rowCount').innerText = `(ทั้งหมด ${dataArray.length} รายการ, แสดงตัวอย่าง 10 รายการ)`;
    }

    // ==========================================
    // ระบบบันทึก Master Data เข้า Firebase
    // ==========================================
    document.getElementById('saveDbBtn').addEventListener('click', async () => {
      if (parsedExcelData.length === 0) return;
      
      const confirmSave = confirm(`ต้องการอัปเดตฐานข้อมูลยาทั้งหมด ${parsedExcelData.length} รายการ ใช่หรือไม่?`);
      if (!confirmSave) return;

      try {
        // ใช้ update แบบรวบยอด (Batch update) เพื่อความเร็ว
        const updates = {};
        parsedExcelData.forEach((drug, index) => {
          // พยายามหาคีย์ที่เป็น "รหัสยา" หรือ "Code" ถ้าไม่มีใช้ index เป็น key
          let drugCode = drug['รหัสยา'] || drug['DrugCode'] || drug['code'] || `drug_${index+1}`;
          // ทำให้ key ไม่มีอักขระพิเศษที่ firebase ห้าม (# $ [ ] . )
          drugCode = String(drugCode).replace(/[.#$\[\]]/g, "_"); 
          updates[`master_drugs/${drugCode}`] = drug;
        });

        await update(ref(db), updates);
        showToast("บันทึกฐานข้อมูลยาลงระบบสำเร็จ!", "success");
        
        // โหลดข้อมูลใส่ Datalist ทันที
        loadMasterDrugs();

      } catch (error) {
        console.error(error);
        showToast("เกิดข้อผิดพลาดในการบันทึก", "error");
      }
    });

    // ==========================================
    // ระบบ Stock In (โหลดข้อมูลยาใส่ Autocomplete)
    // ==========================================
    function loadMasterDrugs() {
      const datalist = document.getElementById('drugList');
      const masterRef = ref(db, 'master_drugs');
      
      onValue(masterRef, (snapshot) => {
        datalist.innerHTML = ''; // ล้างของเก่า
        if (snapshot.exists()) {
          const drugs = snapshot.val();
          Object.values(drugs).forEach(drug => {
            // หาส่วนที่เป็นชื่อยา
            const drugName = drug['ชื่อยา'] || drug['DrugName'] || drug['name'] || '-';
            const drugCode = drug['รหัสยา'] || drug['DrugCode'] || '';
            
            const option = document.createElement('option');
            // แสดง "รหัสยา: ชื่อยา"
            option.value = `${drugCode} | ${drugName}`;
            datalist.appendChild(option);
          });
        }
      });
    }

    // เรียกโหลดรายชื่อยาทันทีตอนเปิดหน้า
    loadMasterDrugs();

    // ==========================================
    // จัดการบันทึกการเติมยาเข้าตู้ (Submit Stock In)
    // ==========================================
    document.getElementById('stockInBtn').addEventListener('click', async () => {
      const drugVal = document.getElementById('drugInput').value.trim();
      const lotVal = document.getElementById('lotInput').value.trim();
      const expVal = document.getElementById('expInput').value;
      const qtyVal = parseInt(document.getElementById('qtyInput').value);
      const slotVal = document.getElementById('slotInput').value;

      // ตรวจสอบความถูกต้องของข้อมูล
      if (!drugVal) return showToast("กรุณาระบุชื่อยา", "error");
      if (!lotVal) return showToast("กรุณาระบุ Lot Number", "error");
      if (!expVal) return showToast("กรุณาระบุวันหมดอายุ", "error");
      if (!qtyVal || qtyVal < 1) return showToast("จำนวนยาต้องมากกว่า 0", "error");
      if (!slotVal) return showToast("กรุณาเลือกช่องเก็บยา (Slot)", "error");

      try {
        // แยกเอาเฉพาะรหัสยาจากที่เลือกใน dropdown ("CODE | NAME")
        const drugCode = drugVal.split('|')[0].trim();

        // สร้างข้อมูลที่จะเก็บ
        const stockData = {
          drugInfo: drugVal,
          drugCode: drugCode,
          lotNumber: lotVal,
          expDate: expVal,
          quantity: qtyVal,
          slotId: slotVal,
          addedBy: auth.currentUser ? auth.currentUser.email : "unknown",
          timestamp: Date.now()
        };

        // สร้างรายการใหม่ในโหนด cabinet_inventory/{slot_id}
        const newStockRef = push(ref(db, `cabinet_inventory/${slotVal}`));
        await set(newStockRef, stockData);

        showToast(`นำยาเข้าช่อง ${slotVal} สำเร็จ จำนวน ${qtyVal} หน่วย!`, "success");
        
        // เคลียร์ฟอร์ม
        document.getElementById('drugInput').value = '';
        document.getElementById('lotInput').value = '';
        document.getElementById('expInput').value = '';
        document.getElementById('qtyInput').value = '';
        document.getElementById('slotInput').value = '';

      } catch (error) {
        console.error(error);
        showToast("เกิดข้อผิดพลาดในการบันทึกตู้ยา", "error");
      }
    });

  </script>
</body>
</html>
