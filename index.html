<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Smart Cabinet</title>

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Kanit:wght@300;400;500&family=Outfit:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent-dark: #2f3640;
            --phyathai-dark-green: #2f6f5e;
            --phyathai-light-green: #8bcfae;
        }

        body {
            margin: 0;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #f6d365);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-style: italic;
            margin-bottom: 8px;
        }

        .creator-badge,
        .co-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.45);
            padding: 7px 22px;
            border-radius: 999px;
            margin-top: 10px;
        }

        .co-badge b {
            color: var(--phyathai-dark-green);
        }

        .login-card {
            margin-top: 35px;
            width: 100%;
            max-width: 380px;
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 26px;
            backdrop-filter: blur(22px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        .login-badge-label {
            background: var(--accent-dark);
            color: #fff;
            padding: 7px 20px;
            border-radius: 0 0 18px 0;
            font-size: 0.8rem;
            width: fit-content;
        }

        .login-title {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            margin-top: 20px;
        }

        .login-subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: 'Kanit', sans-serif;
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 999px;
            background: var(--accent-dark);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }

        button.register {
            background: #6c5ce7;
        }

        #error-msg {
            display: none;
            color: #e74c3c;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }

        .footer-credit {
            margin-top: 35px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: #fff;
        }
    </style>
</head>

<body>

    <h1 class="header-title">Medicine Cabinet</h1>

    <div class="creator-badge">
        Designed by <b style="color:#d35400;">BME KMUTNB</b>
    </div>

    <div class="co-badge">
        Collaborated with <b>Phyathai 3 Hospital</b>
    </div>

    <div class="login-card">
        <div class="login-badge-label">LOGIN</div>

        <div class="login-title">เข้าสู่ระบบ</div>
        <div class="login-subtitle">ระบบตู้ยาอัจฉริยะ</div>

        <div id="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" required>
            </div>

            <div class="input-group">
                <label>รหัสผ่าน (Password)</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" id="btnLogin">เข้าสู่ระบบ</button>

            <!-- 🔗 ลิงก์ไปสมัครสมาชิก -->
            <a href="register.html" style="text-decoration:none;">
                <button type="button" class="register">สมัครสมาชิก</button>
            </a>
        </form>
    </div>

    <div class="footer-credit">Biomedical Engineering Project</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEDJ0GGOqxPGik5huW9XdNEgcnlMs_ebM",
            authDomain: "slot-drug.firebaseapp.com",
            projectId: "slot-drug",
            storageBucket: "slot-drug.firebasestorage.app",
            messagingSenderId: "805318911272",
            appId: "1:805318911272:web:d5c569063937d56eb01c1d",
            databaseURL: "https://slot-drug-default-rtdb.asia-southeast1.firebasedatabase.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const errorMsg = document.getElementById("error-msg");
        const loginForm = document.getElementById("loginForm");
        const loginButton = document.getElementById("btnLogin");

        function showError(message) {
            errorMsg.innerText = message;
            errorMsg.style.display = "block";
        }

        function hideError() {
            errorMsg.innerText = "";
            errorMsg.style.display = "none";
        }

        function usernameToEmail(username) {
            return username.includes("@") ? username : username + "@smartcabinet.com";
        }

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById("username").value.trim().toLowerCase();
            const password = document.getElementById("password").value;

            if (!username || !password) {
                showError("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
                return;
            }

            if (password.length < 6) {
                showError("รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร");
                return;
            }

            const invalidChars = /[.#$[\]]/;
            if (invalidChars.test(username)) {
                showError("ชื่อผู้ใช้มีอักขระที่ไม่อนุญาต");
                return;
            }

            const email = usernameToEmail(username);

            try {
                loginButton.disabled = true;
                loginButton.innerText = "กำลังเข้าสู่ระบบ...";

                await signInWithEmailAndPassword(auth, email, password);

                const snapshot = await get(ref(db, `users/${username}`));

                if (!snapshot.exists()) {
                    await signOut(auth);
                    showError("ไม่พบข้อมูลผู้ใช้ในระบบ");
                    return;
                }

                const userData = snapshot.val();

                if (!userData.approval) {
                    await signOut(auth);
                    showError("บัญชียังไม่ได้รับการอนุมัติ");
                    return;
                }

                if (userData.role === "admin") {
                    window.location.href = "admin.html";
                } else if (userData.role === "staff") {
                    window.location.href = "dashboard.html";
                } else {
                    await signOut(auth);
                    showError("บทบาทของผู้ใช้งานไม่ถูกต้อง กรุณาติดต่อผู้ดูแลระบบ");
                }
            } catch (error) {
                console.error("Login error:", error.code, error.message);

                switch (error.code) {
                    case "auth/invalid-credential":
                    case "auth/wrong-password":
                    case "auth/user-not-found":
                    case "auth/invalid-email":
                        showError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                        break;
                    case "auth/network-request-failed":
                        showError("ไม่สามารถเชื่อมต่อเครือข่ายได้");
                        break;
                    default:
                        showError("เกิดข้อผิดพลาดในการเข้าสู่ระบบ");
                }
            } finally {
                loginButton.disabled = false;
                loginButton.innerText = "เข้าสู่ระบบ";
            }
        });
    </script>

</body>

</html>
