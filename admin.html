<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Approval • Smart Cabinet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg1: #eef6ff;
      --bg2: #fdf2ff;
      --card: rgba(255,255,255,0.78);
      --line: #dfe6ee;
      --text: #243447;
      --muted: #6b7a8c;
      --primary: #2f3640;
      --green: #27ae60;
      --orange: #f39c12;
      --red: #e74c3c;
      --blue: #3498db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 2rem;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select, input {
      font-family: inherit;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-dark { background: var(--primary); color: white; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-orange { background: var(--orange); color: white; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stat-card .value {
      margin-top: 6px;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search {
      min-width: 260px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
    }

    .filter {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f7faff;
      z-index: 2;
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #edf1f5;
      vertical-align: middle;
      font-size: 0.95rem;
    }

    tbody tr:hover {
      background: #fbfdff;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .badge-approved { background: #eafaf1; color: #1e8449; }
    .badge-pending { background: #fff6e5; color: #b9770e; }

    .role-select {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-wrap">
        <h1>จัดการผู้ใช้งาน</h1>
        <p>ตรวจสอบรายชื่อ อนุมัติการใช้งาน และกำหนดสิทธิ์ผ่าน Firebase แบบอัตโนมัติ</p>
      </div>

      <div class="top-actions">
        <button class="btn btn-dark" onclick="window.location.href='dashboard.html'">
          <i class="fa-solid fa-table-columns"></i> ไปหน้าหลัก
        </button>
        <button class="btn btn-red" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
        </button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">ผู้ใช้ทั้งหมด</div>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">รออนุมัติ</div>
        <div class="value" id="pendingUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Admin</div>
        <div class="value" id="adminUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Staff</div>
        <div class="value" id="staffUsers">0</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search" id="searchInput" type="text" placeholder="ค้นหาชื่อ, username, email">
          <select class="filter" id="statusFilter">
            <option value="all">ทุกสถานะ</option>
            <option value="approved">อนุมัติแล้ว</option>
            <option value="pending">รออนุมัติ</option>
          </select>
          <select class="filter" id="roleFilter">
            <option value="all">ทุก role</option>
            <option value="admin">admin</option>
            <option value="staff">staff</option>
          </select>
        </div>

        <div class="toolbar-right">
          <button class="btn btn-blue" id="refreshBtn">
            <i class="fa-solid fa-rotate"></i> รีเฟรช
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:70px;">ลำดับ</th>
              <th>Username</th>
              <th>ชื่อ-นามสกุล</th>
              <th>Email</th>
              <th>Role</th>
              <th>Approval</th>
              <th>วันที่สมัคร</th>
              <th style="width:320px;">การจัดการ</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>

      <div class="empty" id="emptyState" style="display:none;">
        ไม่พบข้อมูลผู้ใช้งาน
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      onValue,
      update,
      remove,
      get
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEDJ0GGOqxPGik5huW9XdNEgcnlMs_ebM",
      authDomain: "slot-drug.firebaseapp.com",
      projectId: "slot-drug",
      storageBucket: "slot-drug.firebasestorage.app",
      messagingSenderId: "805318911272",
      appId: "1:805318911272:web:d5c569063937d56eb01c1d",
      databaseURL: "https://slot-drug-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const tableBody = document.getElementById("userTableBody");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const roleFilter = document.getElementById("roleFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    let allUsers = [];
    let hasSubscribedUsers = false;

    function formatDate(timestamp) {
      if (!timestamp) return "-";
      const d = new Date(timestamp);
      return d.toLocaleString("th-TH");
    }

    function escapeHtml(text) {
      if (text == null) return "";
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderStats(users) {
      const total = users.length;
      const pending = users.filter(u => !u.approval).length;
      const admins = users.filter(u => u.role === "admin").length;
      const staffs = users.filter(u => u.role === "staff").length;

      document.getElementById("totalUsers").innerText = total;
      document.getElementById("pendingUsers").innerText = pending;
      document.getElementById("adminUsers").innerText = admins;
      document.getElementById("staffUsers").innerText = staffs;
    }

    function getFilteredUsers() {
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const role = roleFilter.value;

      return allUsers.filter(user => {
        const matchKeyword =
          (user.username || "").toLowerCase().includes(keyword) ||
          (user.name || "").toLowerCase().includes(keyword) ||
          (user.email || "").toLowerCase().includes(keyword);

        const matchStatus =
          status === "all" ||
          (status === "approved" && user.approval === true) ||
          (status === "pending" && user.approval !== true);

        const matchRole =
          role === "all" || user.role === role;

        return matchKeyword && matchStatus && matchRole;
      });
    }

    function renderTable() {
      const users = getFilteredUsers();
      renderStats(allUsers);
      tableBody.innerHTML = "";

      if (!users.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      users.forEach((user, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(user.username || "-")}</td>
          <td>${escapeHtml(user.name || "-")}</td>
          <td>${escapeHtml(user.email || "-")}</td>
          <td>
            <select class="role-select" data-username="${escapeHtml(user.username)}">
              <option value="admin" ${user.role === "admin" ? "selected" : ""}>admin</option>
              <option value="staff" ${user.role === "staff" ? "selected" : ""}>staff</option>
            </select>
          </td>
          <td>
            ${
              user.approval
                ? '<span class="badge badge-approved">อนุมัติแล้ว</span>'
                : '<span class="badge badge-pending">รออนุมัติ</span>'
            }
          </td>
          <td>${formatDate(user.createdAt)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-green approve-btn" data-username="${escapeHtml(user.username)}">
                อนุมัติ
              </button>
              <button class="btn btn-orange reject-btn" data-username="${escapeHtml(user.username)}">
                ยกเลิกอนุมัติ
              </button>
              <button class="btn btn-red delete-btn" data-username="${escapeHtml(user.username)}">
                ลบ
              </button>
            </div>
          </td>
        `;

        tableBody.appendChild(tr);
      });

      bindTableActions();
    }

    function bindTableActions() {
      document.querySelectorAll(".approve-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          await update(ref(db, `users/${username}`), { approval: true });
        };
      });

      document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          await update(ref(db, `users/${username}`), { approval: false });
        };
      });

      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          const ok = confirm(`ต้องการลบผู้ใช้ ${username} ใช่หรือไม่`);
          if (!ok) return;
          await remove(ref(db, `users/${username}`));
        };
      });

      document.querySelectorAll(".role-select").forEach(select => {
        select.onchange = async () => {
          const username = select.dataset.username;
          await update(ref(db, `users/${username}`), { role: select.value });
        };
      });
    }

    function subscribeUsers() {
      if (hasSubscribedUsers) return;
      hasSubscribedUsers = true;

      const usersRef = ref(db, "users");

      onValue(usersRef, (snapshot) => {
        const data = snapshot.val() || {};
        const rows = Object.entries(data).map(([username, value]) => ({
          username,
          name: value.name || "",
          email: value.email || "",
          role: value.role || "staff",
          approval: value.approval === true,
          createdAt: value.createdAt || 0
        }));

        rows.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        allUsers = rows;
        renderTable();
      }, (error) => {
        console.error("อ่าน users ไม่สำเร็จ:", error);
        alert("ไม่สามารถโหลดข้อมูลผู้ใช้ได้");
      });
    }

    async function initAdminPage() {
      try {
        await setPersistence(auth, browserLocalPersistence);

        onAuthStateChanged(auth, async (user) => {
          console.log("auth state:", user);

          if (!user) {
            window.location.href = "index.html";
            return;
          }

          try {
            const username = (user.email || "").split("@")[0];
            const snapshot = await get(ref(db, `users/${username}`));

            if (!snapshot.exists()) {
              await signOut(auth);
              window.location.href = "index.html";
              return;
            }

            const userData = snapshot.val();

            if (userData.role !== "admin") {
              window.location.href = "dashboard.html";
              return;
            }

            subscribeUsers();
          } catch (error) {
            console.error("error:", error);
            await signOut(auth);
            window.location.href = "index.html";
          }
        });
      } catch (error) {
        console.error("setPersistence error:", error);
        window.location.href = "index.html";
      }
    }

    searchInput.addEventListener("input", renderTable);
    statusFilter.addEventListener("change", renderTable);
    roleFilter.addEventListener("change", renderTable);
    refreshBtn.addEventListener("click", renderTable);

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    initAdminPage();
  </script>
</body>
</html>
