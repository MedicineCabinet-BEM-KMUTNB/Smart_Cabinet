<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Approval • Smart Cabinet</title>

  <!-- นำเข้า Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Kanit:wght@300;400;500&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg1: #eef6ff;
      --bg2: #fdf2ff;
      --card: rgba(255,255,255,0.78);
      --line: #dfe6ee;
      --text: #243447;
      --muted: #6b7a8c;
      --primary: rgba(47, 54, 64, 0.7);
      --green: rgba(39, 174, 96, 0.7);
      --orange: rgba(243, 156, 18, 0.7);
      --red: rgba(231, 76, 60, 0.7);
      --blue: rgba(52, 152, 219, 0.7);
      --purple: rgba(155, 89, 182, 0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #f6d365);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      padding: 24px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 2.2rem;
      font-family: 'Cormorant Garamond', serif;
      color: #2c3e50;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: #4a5c6e;
      font-weight: 300;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select, input {
      font-family: inherit;
    }

    /* สไตล์ปุ่มแบบ Liquid Glass (iOS Style) */
    .btn {
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 999px; /* ทรงโค้งมนแบบแคปซูล */
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      backdrop-filter: blur(12px); /* เอฟเฟกต์กระจกฝ้า */
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.8);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.4);
    }

    /* สีปุ่มแบบโปร่งแสง */
    .btn-dark { background: var(--primary); color: white; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-purple { background: var(--purple); color: white; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card, .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 35px rgba(0,0,0,0.12);
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .stat-card .value {
      margin-top: 6px;
      font-size: 2rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      color: #2c3e50;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search, .filter, .role-select {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .search:focus, .filter:focus, .role-select:focus {
      background: white;
      border-color: #a1c4fd;
      box-shadow: 0 0 0 3px rgba(161, 196, 253, 0.3);
    }

    .search { min-width: 260px; }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 16px;
      background: rgba(255,255,255,0.4);
    }

    table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(247, 250, 255, 0.9);
      backdrop-filter: blur(8px);
      z-index: 2;
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 0.95rem;
      white-space: nowrap;
      font-weight: 600;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.03);
      vertical-align: middle;
      font-size: 0.95rem;
    }

    tbody tr {
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.7);
    }

    /* --- Table Sorting --- */
    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    th.sortable:hover {
      background: rgba(220, 230, 255, 0.9);
    }
    .sort-icon {
      margin-left: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    th.sortable.active .sort-icon {
      opacity: 1;
      color: var(--blue);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .badge-approved { background: rgba(234, 250, 241, 0.9); color: #1e8449; border: 1px solid #c2e9d2;}
    .badge-pending { background: rgba(255, 246, 229, 0.9); color: #b9770e; border: 1px solid #fae5b9;}

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* --- Toast Notification --- */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 4px solid var(--blue);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    .toast.warning { border-color: var(--orange); }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-wrap">
        <h1>จัดการผู้ใช้งาน</h1>
        <p>ตรวจสอบรายชื่อ อนุมัติการใช้งาน และกำหนดสิทธิ์ผ่าน Firebase แบบอัตโนมัติ</p>
      </div>

      <div class="top-actions">
        <!-- ปุ่มไปหน้าจัดการคลังยา -->
        <button class="btn btn-purple" onclick="window.location.href='inventory.html'">
          <i class="fa-solid fa-boxes-stacked"></i> จัดการคลังยา
        </button>
        <button class="btn btn-dark" onclick="window.location.href='dashboard.html'">
          <i class="fa-solid fa-table-columns"></i> ไปหน้าหลัก
        </button>
        <button class="btn btn-red" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
        </button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">ผู้ใช้ทั้งหมด</div>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">รออนุมัติ</div>
        <div class="value" id="pendingUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Admin</div>
        <div class="value" id="adminUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Staff</div>
        <div class="value" id="staffUsers">0</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search" id="searchInput" type="text" placeholder="ค้นหาชื่อ, username, email">
          <select class="filter" id="statusFilter">
            <option value="all">ทุกสถานะ</option>
            <option value="approved">อนุมัติแล้ว</option>
            <option value="pending">รออนุมัติ</option>
          </select>
          <select class="filter" id="roleFilter">
            <option value="all">ทุก role</option>
            <option value="admin">admin</option>
            <option value="staff">staff</option>
          </select>
        </div>

        <div class="toolbar-right">
          <button class="btn btn-blue" id="refreshBtn">
            <i class="fa-solid fa-rotate"></i> รีเฟรช
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:70px;">ลำดับ</th>
              <th class="sortable" data-sort="username">Username <i class="fa-solid fa-sort sort-icon"></i></th>
              <th class="sortable" data-sort="name">ชื่อ-นามสกุล <i class="fa-solid fa-sort sort-icon"></i></th>
              <th class="sortable" data-sort="email">Email <i class="fa-solid fa-sort sort-icon"></i></th>
              <th class="sortable" data-sort="role">Role <i class="fa-solid fa-sort sort-icon"></i></th>
              <th class="sortable" data-sort="approval">Approval <i class="fa-solid fa-sort sort-icon"></i></th>
              <th class="sortable active" data-sort="createdAt">วันที่สมัคร <i class="fa-solid fa-sort-down sort-icon"></i></th>
              <th style="width:320px;">การจัดการ</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>

      <div class="empty" id="emptyState" style="display:none;">
        ไม่พบข้อมูลผู้ใช้งาน
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      onValue,
      update,
      remove,
      get
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEDJ0GGOqxPGik5huW9XdNEgcnlMs_ebM",
      authDomain: "slot-drug.firebaseapp.com",
      projectId: "slot-drug",
      storageBucket: "slot-drug.firebasestorage.app",
      messagingSenderId: "805318911272",
      appId: "1:805318911272:web:d5c569063937d56eb01c1d",
      databaseURL: "https://slot-drug-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ==========================================
    // ปรับแต่ง UI ด้วย JavaScript
    // ==========================================

    // สร้าง Footer ใหม่โดยปรับฟอนต์ให้โมเดิร์นขึ้น (ไม่เอียง ใช้ฟอนต์ Outfit/Kanit)
    const footer = document.createElement("footer");
    footer.style.marginTop = "40px";
    footer.style.textAlign = "center";
    footer.style.fontFamily = "'Outfit', 'Kanit', sans-serif";
    footer.style.fontWeight = "500";
    footer.style.color = "#2c3e50"; 
    footer.style.letterSpacing = "0.5px";
    footer.style.opacity = "0.8";
    footer.innerText = "Admin Dashboard • Smart Cabinet Project";
    document.body.appendChild(footer);

    // ==========================================
    // ระบบ Toast Notification
    // ==========================================
    function showToast(message, type = "success") {
      let container = document.getElementById("toast-container");
      if (!container) {
        container = document.createElement("div");
        container.id = "toast-container";
        container.className = "toast-container";
        document.body.appendChild(container);
      }

      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      
      let icon = "fa-circle-check";
      let color = "var(--green)";
      if (type === "error") { icon = "fa-circle-xmark"; color = "var(--red)"; }
      if (type === "warning") { icon = "fa-triangle-exclamation"; color = "var(--orange)"; }

      toast.innerHTML = `<i class="fa-solid ${icon}" style="font-size:1.2rem; color:${color};"></i> 
                         <span style="font-weight:500;">${escapeHtml(message)}</span>`;
      container.appendChild(toast);

      // เริ่มทำงาน Animation
      toast.offsetHeight;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // ==========================================
    // ระบบจัดการตารางผู้ใช้
    // ==========================================
    const tableBody = document.getElementById("userTableBody");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const roleFilter = document.getElementById("roleFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    let allUsers = [];
    let hasSubscribedUsers = false;

    // Sorting State
    let sortCol = "createdAt";
    let sortDesc = true;

    function formatDate(timestamp) {
      if (!timestamp) return "-";
      const d = new Date(timestamp);
      return d.toLocaleString("th-TH");
    }

    function escapeHtml(text) {
      if (text == null) return "";
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderStats(users) {
      const total = users.length;
      const pending = users.filter(u => !u.approval).length;
      const admins = users.filter(u => u.role === "admin").length;
      const staffs = users.filter(u => u.role === "staff").length;

      document.getElementById("totalUsers").innerText = total;
      document.getElementById("pendingUsers").innerText = pending;
      document.getElementById("adminUsers").innerText = admins;
      document.getElementById("staffUsers").innerText = staffs;
    }

    function getFilteredUsers() {
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const role = roleFilter.value;

      let filtered = allUsers.filter(user => {
        const matchKeyword =
          (user.username || "").toLowerCase().includes(keyword) ||
          (user.name || "").toLowerCase().includes(keyword) ||
          (user.email || "").toLowerCase().includes(keyword);

        const matchStatus =
          status === "all" ||
          (status === "approved" && user.approval === true) ||
          (status === "pending" && user.approval !== true);

        const matchRole =
          role === "all" || user.role === role;

        return matchKeyword && matchStatus && matchRole;
      });

      // Sorting logic
      filtered.sort((a, b) => {
        let valA = a[sortCol];
        let valB = b[sortCol];

        if (typeof valA === "string") valA = valA.toLowerCase();
        if (typeof valB === "string") valB = valB.toLowerCase();

        if (typeof valA === "boolean") valA = valA ? 1 : 0;
        if (typeof valB === "boolean") valB = valB ? 1 : 0;

        if (valA < valB) return sortDesc ? 1 : -1;
        if (valA > valB) return sortDesc ? -1 : 1;
        return 0;
      });

      return filtered;
    }

    function renderTable() {
      const users = getFilteredUsers();
      renderStats(allUsers);
      tableBody.innerHTML = "";

      if (!users.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      users.forEach((user, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${escapeHtml(user.username || "-")}</td>
          <td>${escapeHtml(user.name || "-")}</td>
          <td>${escapeHtml(user.email || "-")}</td>
          <td>
            <select class="role-select" data-username="${escapeHtml(user.username)}">
              <option value="admin" ${user.role === "admin" ? "selected" : ""}>admin</option>
              <option value="staff" ${user.role === "staff" ? "selected" : ""}>staff</option>
            </select>
          </td>
          <td>
            ${
              user.approval
                ? '<span class="badge badge-approved">อนุมัติแล้ว</span>'
                : '<span class="badge badge-pending">รออนุมัติ</span>'
            }
          </td>
          <td>${formatDate(user.createdAt)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-green approve-btn" data-username="${escapeHtml(user.username)}">
                <i class="fa-solid fa-check"></i> อนุมัติ
              </button>
              <button class="btn btn-orange reject-btn" data-username="${escapeHtml(user.username)}">
                <i class="fa-solid fa-xmark"></i> ยกเลิก
              </button>
              <button class="btn btn-red delete-btn" data-username="${escapeHtml(user.username)}">
                <i class="fa-solid fa-trash-can"></i> ลบ
              </button>
            </div>
          </td>
        `;

        tableBody.appendChild(tr);
      });

      bindTableActions();
    }

    // ==========================================
    // การจัดการ Header Sorting
    // ==========================================
    document.querySelectorAll("th.sortable").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (sortCol === col) {
          sortDesc = !sortDesc;
        } else {
          sortCol = col;
          sortDesc = false; // ค่าเริ่มต้นเวลาเปลี่ยนคอลัมน์ให้เรียง ก-ฮ (น้อยไปมาก)
        }

        // อัปเดตไอคอนบนหัวตาราง
        document.querySelectorAll("th.sortable").forEach(el => {
          el.classList.remove("active");
          el.querySelector(".sort-icon").className = "fa-solid fa-sort sort-icon";
        });
        th.classList.add("active");
        th.querySelector(".sort-icon").className = `fa-solid fa-sort-${sortDesc ? 'down' : 'up'} sort-icon`;

        renderTable();
      });
    });

    function bindTableActions() {
      document.querySelectorAll(".approve-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          await update(ref(db, `users/${username}`), { approval: true });
          showToast(`อนุมัติผู้ใช้ ${username} สำเร็จ`, "success");
        };
      });

      document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          await update(ref(db, `users/${username}`), { approval: false });
          showToast(`ยกเลิกการอนุมัติ ${username} แล้ว`, "warning");
        };
      });

      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.onclick = async () => {
          const username = btn.dataset.username;
          const ok = confirm(`ต้องการลบผู้ใช้ ${username} ใช่หรือไม่`);
          if (!ok) return;
          await remove(ref(db, `users/${username}`));
          showToast(`ลบผู้ใช้ ${username} ออกจากระบบแล้ว`, "error");
        };
      });

      document.querySelectorAll(".role-select").forEach(select => {
        select.onchange = async () => {
          const username = select.dataset.username;
          await update(ref(db, `users/${username}`), { role: select.value });
          showToast(`เปลี่ยนสิทธิ์ ${username} เป็น ${select.value.toUpperCase()}`, "success");
        };
      });
    }

    function subscribeUsers() {
      if (hasSubscribedUsers) return;
      hasSubscribedUsers = true;

      const usersRef = ref(db, "users");

      onValue(usersRef, (snapshot) => {
        const data = snapshot.val() || {};
        const rows = Object.entries(data).map(([username, value]) => ({
          username,
          name: value.name || "",
          email: value.email || "",
          role: value.role || "staff",
          approval: value.approval === true,
          createdAt: value.createdAt || 0
        }));

        allUsers = rows;
        renderTable(); // จะถูกจัดเรียงในฟังก์ชัน getFilteredUsers อีกที
      }, (error) => {
        console.error("อ่าน users ไม่สำเร็จ:", error);
        alert("ไม่สามารถโหลดข้อมูลผู้ใช้ได้");
      });
    }

    async function initAdminPage() {
      try {
        await setPersistence(auth, browserLocalPersistence);

        onAuthStateChanged(auth, async (user) => {
          console.log("auth state:", user);

          if (!user) {
            window.location.href = "index.html";
            return;
          }

          try {
            const username = (user.email || "").split("@")[0];
            const snapshot = await get(ref(db, `users/${username}`));

            if (!snapshot.exists()) {
              await signOut(auth);
              window.location.href = "index.html";
              return;
            }

            const userData = snapshot.val();

            if (userData.role !== "admin") {
              window.location.href = "dashboard.html";
              return;
            }

            subscribeUsers();
          } catch (error) {
            console.error("error:", error);
            await signOut(auth);
            window.location.href = "index.html";
          }
        });
      } catch (error) {
        console.error("setPersistence error:", error);
        window.location.href = "index.html";
      }
    }

    searchInput.addEventListener("input", renderTable);
    statusFilter.addEventListener("change", renderTable);
    roleFilter.addEventListener("change", renderTable);
    refreshBtn.addEventListener("click", renderTable);

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });

    initAdminPage();
  </script>
</body>
</html>
